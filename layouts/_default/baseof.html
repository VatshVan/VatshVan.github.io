<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0f19">
    <title>{{ block "title" . }}{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}{{ end }}</title>
    {{ if .Description }}<meta name="description" content="{{ .Description }}">{{ end }}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous" onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false}]});"></script>
    {{ block "head" . }}{{ end }}
  </head>
  <body>
    <div class="site-shell">
      <div class="site-bg"></div>
      <header class="topbar">
        <a class="brand" href="{{ site.Home.RelPermalink }}">Vatsh Van</a>
        <nav class="nav">
          {{ range site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
          {{ end }}
        </nav>
      </header>
      <main>
        {{ block "main" . }}{{ end }}
      </main>
      <footer class="footer">
        <span>Minimal, modular, static. Built with Hugo and Hugo Blox.</span>
        <span>Math ready. GitHub Pages compatible. Easy to extend with new markdown files.</span>
      </footer>
    </div>
  </body>
</html>
