{{ define "title" }}{{ .Title }} | {{ site.Title }}{{ end }}
{{ define "main" }}
  <article class="panel single-page">
    <p class="eyebrow">{{ .Section }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.organization }}<p class="section-note">{{ . }}</p>{{ end }}
    {{ with .Resources.GetMatch "featured.*" }}<img class="single-image" src="{{ .RelPermalink }}" alt="{{ $.Title }} illustration">{{ end }}
    <div class="single-content">{{ .Content }}</div>
  </article>
{{ end }}
