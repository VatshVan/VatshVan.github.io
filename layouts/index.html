{{ define "main" }}
<div id="terminal-entry" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #050a15; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 2rem; font-family: 'Space Grotesk', monospace; color: #38bdf8; overflow: hidden;">
  <div id="terminal-content" style="max-width: 800px; margin: 0 auto; width: 100%;"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const terminalEntry = document.getElementById("terminal-entry");
  const terminalContent = document.getElementById("terminal-content");
  
  // Check if we already played the animation in this session
  if (sessionStorage.getItem("entryAnimationPlayed")) {
    window.location.replace("{{ "home/" | relURL }}");
    return;
  }
  
  // Hide topbar and footer from baseof if they exist
  const topbar = document.querySelector(".topbar");
  const footer = document.querySelector(".footer");
  if (topbar) topbar.style.display = "none";
  if (footer) footer.style.display = "none";

  const lines = [
    "INITIALIZING SYSTEM ARCHITECTURE...",
    "LOADING DEPENDENCIES: [QUANTITATIVE_FINANCE, AUTONOMOUS_CONTROL, MACHINE_LEARNING]",
    "ESTABLISHING SECURE CONNECTION...",
    "VERIFYING CREDENTIALS: VATSH VAN",
    "ACCESS GRANTED.",
    "ROUTING TO MAIN INTERFACE..."
  ];

  let lineIndex = 0;
  let charIndex = 0;
  let currentLineElement = null;

  function typeWriter() {
    if (lineIndex < lines.length) {
      if (!currentLineElement) {
        currentLineElement = document.createElement("p");
        currentLineElement.style.margin = "0.5rem 0";
        currentLineElement.style.fontWeight = "500";
        terminalContent.appendChild(currentLineElement);
      }

      if (charIndex < lines[lineIndex].length) {
        currentLineElement.innerHTML += lines[lineIndex].charAt(charIndex);
        charIndex++;
        setTimeout(typeWriter, Math.random() * 30 + 20); // typing speed
      } else {
        currentLineElement.innerHTML += "<br>";
        lineIndex++;
        charIndex = 0;
        currentLineElement = null;
        setTimeout(typeWriter, 300); // delay between lines
      }
    } else {
      // Animation complete
      sessionStorage.setItem("entryAnimationPlayed", "true");
      setTimeout(() => {
        window.location.replace("{{ "home/" | relURL }}");
      }, 500);
    }
  }

  // Start typing
  setTimeout(typeWriter, 500);
});
</script>
{{ end }}
