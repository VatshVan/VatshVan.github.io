<article class="timeline-card">
  <div class="timeline-media" style="position: relative; min-height: 260px; width: 100%; background: #0a0f1d; border-radius: var(--radius-sm); border: 1px solid var(--border); overflow: hidden;">
    {{ with .Resources.GetMatch "featured.*" }}
    <img src="{{ .RelPermalink }}" alt="{{ $.Title }} illustration" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;">
    {{ else }}
    <canvas class="timeline-sim" data-title="{{ .Title | lower }}" style="position: absolute; inset: 0; width: 100%; height: 100%; display: block;"></canvas>
    {{ end }}
  </div>
  <div class="timeline-copy">
    <div class="meta-row">
      <h3>{{ .Title }}</h3>
      {{ with .Params.organization }}<span>{{ . }}</span>{{ end }}
    </div>
    <p class="date">{{ .Date.Format "Jan 2006" }} - Present</p>
    <p>{{ .Summary }}</p>
    <div class="bullet-list">
      {{ .Content }}
    </div>
  </div>
</article>
