<a href="{{ .RelPermalink }}" class="timeline-card-link" style="text-decoration: none; color: inherit; display: block; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1.5rem; transition: var(--transition);">
  <div class="publications-card">
    <h3 style="color: var(--accent); margin-bottom: 0.5rem;">{{ .Title }}</h3>
    <span style="font-family: var(--mono); color: var(--accent-3); font-size: 0.9rem;">>_ {{ .Summary }}</span>
    <div class="tag-row" style="margin-top: 1rem;">
      {{ range .Params.tags }}<span class="tag">#{{ . }}</span>{{ end }}
    </div>
    <p style="margin-top: 1rem;">{{ .Content | plainify }}</p>
    
    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
      {{ with .Params.url_pdf }}
        <object data="{{ . }}" style="pointer-events: all;">
          <a href="{{ . }}" class="button button-secondary" target="_blank" rel="noopener" style="pointer-events: auto;">EXECUTE_DOWNLOAD(PDF)</a>
        </object>
      {{ end }}
      <div style="color: var(--accent-2); font-family: var(--mono); font-size: 0.85rem; font-weight: 500; align-self: center; margin-left: auto;">
        > CLICK_TO_EXPAND //
      </div>
    </div>
  </div>
</a>
