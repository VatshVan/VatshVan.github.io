{{ define "main" }}
<section class="panel" id="experience">
  <div class="section-heading split">
    <div>
      <p class="eyebrow">Experience</p>
      <h2>Research & Industrial Experience</h2>
    </div>
  </div>
  <div class="stack">
    {{ range sort .Pages "Date" "desc" }}
      {{ partial "experience_card.html" . }}
    {{ end }}
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const dpr = window.devicePixelRatio || 1;

  // --- Experience Simulations: Quant (Order Book) vs Autonomous (Cart-Pole PID Control) ---
  const quantCanvases = document.querySelectorAll(".timeline-sim");
  const simStates = [];

  quantCanvases.forEach(canvas => {
    const ctx = canvas.getContext("2d", { alpha: false });
    const title = canvas.getAttribute('data-title') || '';
    const isQuant = title.includes('quant') || title.includes('research') || title.includes('consultant') || title.includes('finance');
    
    const parent = canvas.parentElement;
    canvas.width = parent.clientWidth * dpr;
    canvas.height = parent.clientHeight * dpr;
    
    const state = { canvas, ctx, parent, isQuant };

    if(isQuant) {
      state.price = parent.clientHeight / 2;
      state.history = [];
      state.orderBook = Array.from({length: 25}, () => Math.random() * 60);
      state.time = 0;
    } else {
      // Cart-Pole Control System state
      state.targetX = parent.clientWidth / 2;
      state.cx = parent.clientWidth / 2;
      state.cv = 0;
      state.angle = 0;
      state.av = 0;
    }
    simStates.push(state);
  });

  window.addEventListener('resize', () => {
    simStates.forEach(s => {
      s.canvas.width = s.parent.clientWidth * dpr;
      s.canvas.height = s.parent.clientHeight * dpr;
      if(s.isQuant) s.price = s.parent.clientHeight / 2;
    });
  });

  function drawTimelines() {
    simStates.forEach(s => {
      const { ctx, canvas, isQuant } = s;
      const w = canvas.width;
      const h = canvas.height;
      const cw = s.parent.clientWidth;
      const ch = s.parent.clientHeight;
      
      ctx.save();
      ctx.scale(dpr, dpr);
      
      ctx.fillStyle = '#0a0f1d';
      ctx.fillRect(0, 0, cw, ch);

      if(isQuant) {
        // Limit Order Book (Right Side)
        ctx.fillStyle = 'rgba(56, 189, 248, 0.15)';
        for(let i=0; i<25; i++) {
          let y = (ch / 25) * i;
          s.orderBook[i] += (Math.random() - 0.5) * 8;
          s.orderBook[i] = Math.max(5, Math.min(80, s.orderBook[i]));
          ctx.fillRect(cw - s.orderBook[i], y, s.orderBook[i], ch/25 - 2);
        }

        // Geometric Brownian Motion Path
        s.price += (Math.random() - 0.5) * 6;
        s.price = Math.max(20, Math.min(ch-20, s.price));
        s.history.push(s.price);
        if(s.history.length > cw - 100) s.history.shift();

        ctx.beginPath();
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 2;
        for(let i=0; i<s.history.length; i++) {
          let px = i;
          let py = s.history[i];
          if(i===0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();

        if(s.history.length > 0) {
          ctx.beginPath();
          ctx.arc(s.history.length-1, s.price, 4, 0, Math.PI*2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        }
      } else {
        // High-End Cart-Pole Balancing (PID / Optimal Control)
        if(Math.random() < 0.015) s.targetX = cw*0.2 + Math.random()*cw*0.6;
        
        let errX = s.targetX - s.cx;
        s.cv += errX * 0.001 - s.cv * 0.05;
        s.cx += s.cv;
        
        let cartAcc = errX * 0.001;
        s.av += -cartAcc * 0.08; 
        s.av += -s.angle * 0.06 - s.av * 0.1;
        s.angle += s.av;
        
        if(Math.random() < 0.05) s.av += (Math.random()-0.5)*0.03; // disturbances

        // Draw background grid
        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let x=0; x<cw; x+=40) { ctx.moveTo(x, 0); ctx.lineTo(x, ch); }
        for(let y=0; y<ch; y+=40) { ctx.moveTo(0, y); ctx.lineTo(cw, y); }
        ctx.stroke();

        // Draw track
        let trackY = ch * 0.8;
        ctx.beginPath();
        ctx.moveTo(20, trackY);
        ctx.lineTo(cw - 20, trackY);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Target indicator
        ctx.beginPath();
        ctx.moveTo(s.targetX, trackY - 10);
        ctx.lineTo(s.targetX, trackY + 10);
        ctx.strokeStyle = 'rgba(129, 140, 248, 0.4)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw Cart
        ctx.fillStyle = 'rgba(56, 189, 248, 0.8)';
        ctx.fillRect(s.cx - 20, trackY - 10, 40, 20);

        // Draw Pole
        let poleLen = ch * 0.45;
        let px = s.cx + Math.sin(s.angle) * poleLen;
        let py = trackY - 10 - Math.cos(s.angle) * poleLen;
        
        ctx.beginPath();
        ctx.moveTo(s.cx, trackY - 10);
        ctx.lineTo(px, py);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        // Pole mass (glowing)
        ctx.beginPath();
        ctx.arc(px, py, 6, 0, Math.PI*2);
        ctx.fillStyle = '#818cf8'; 
        ctx.fill();
        ctx.shadowBlur = 10; ctx.shadowColor = '#818cf8'; ctx.fill(); ctx.shadowBlur = 0;
      }
      ctx.restore();
    });
    
    if(simStates.length > 0) requestAnimationFrame(drawTimelines);
  }
  if(simStates.length > 0) drawTimelines();
});
</script>
{{ end }}
